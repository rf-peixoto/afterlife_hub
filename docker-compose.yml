version: "3.9"

services:
  afterlife-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afterlife-server
    restart: unless-stopped

    ports:
      - "5050:5050"

    volumes:
      - ./data:/data
      - ./certs:/certs:ro

    read_only: true
    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    command: [
      "python", "server.py",
      "--host", "0.0.0.0",
      "--port", "5050",
      "--cert", "/certs/server.crt",
      "--key", "/certs/server.key"
    ]
