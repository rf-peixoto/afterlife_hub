version: "3.9"

services:
  afterlife-server:
    build: .
    container_name: afterlife-server
    restart: unless-stopped

    ports:
      - "${AFTERLIFE_EXPOSE_PORT:-2077}:5050"

    environment:
      AFTERLIFE_BOOTSTRAP_ADMIN_USERNAME: ${AFTERLIFE_BOOTSTRAP_ADMIN_USERNAME}
      AFTERLIFE_BOOTSTRAP_ADMIN_PASSWORD: ${AFTERLIFE_BOOTSTRAP_ADMIN_PASSWORD}
      AFTERLIFE_CERT_FILE: /app/certs/server.crt
      AFTERLIFE_KEY_FILE: /app/certs/server.key

    volumes:
      - ./certs:/app/certs
      - ./data:/app/data
